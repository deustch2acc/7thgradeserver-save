name: Keep Codespace Alive

on:
  schedule:
    # Runs at the start of every hour and 30 minutes past
    - cron: '*/30 * * * *'
  # Allows manual triggers
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Start/Patch Codespace
        run: |
          # Use GitHub CLI to patch/start the codespace
          # Replace <CODESPACE_NAME> with your actual codespace name
          gh codespace start 7thgradeserver
        env:
          GH_TOKEN: ${{ secrets.pat_key }}
          
      - name: Healthcheck Port
        run: |
          # Optional: Perform a health check via curl
          # Replace 3000 with your container's port
          curl -f http://localhost:8081 || echo "Port not reachable"
