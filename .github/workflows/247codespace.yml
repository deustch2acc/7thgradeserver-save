name: Keep Codespace Alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  start-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Start Codespace via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.pat_key }}
          CODESPACE_NAME: "7thgradeserver"
        run: |
          # Use GH CLI's internal variable expansion or clear shell syntax
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/user/codespaces/$CODESPACE_NAME/start"

      - name: Health check port
        run: |
          # Note: localhost will not work here. 
          # You must use the Codespace's public URL if checking from an external runner.
          curl -f "https://$CODESPACE_NAME.github.dev" || echo "Codespace not responding"
