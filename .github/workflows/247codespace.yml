name: 24/7 codespace runner
on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '*/30 0 * * *'
  workflow_dispatch: # Allows manual testing

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: codespace keepalive
        run: echo "codespace keepalive"
