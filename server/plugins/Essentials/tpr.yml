# Configuration for the random teleport command.
# Use the /settpr command in-game to set random teleport locations.

default-location: '{world}'
excluded-biomes:
- cold_ocean
- deep_cold_ocean
- deep_frozen_ocean
- deep_lukewarm_ocean
- deep_ocean
- deep_warm_ocean
- frozen_ocean
- frozen_river
- lukewarm_ocean
- ocean
- river
- warm_ocean
locations:
  world:
    center:
      world: 80f54fa7-017d-4872-a9f2-3e9a774c1011
      world-name: world
      x: 0.0
      y: 91.0
      z: 0.0
      yaw: 0.0
      pitch: 0.0
